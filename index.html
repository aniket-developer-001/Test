<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Chat</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:10px;}
.container{max-width:400px;margin:auto;}
#chatBox{
    height:300px;
    overflow-y:auto;
    background:#fff;
    padding:10px;
    border-radius:10px;
}
.msg{
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    max-width:70%;
}
.me{background:#4CAF50;color:#fff;margin-left:auto;}
.other{background:#ddd;}
input,button{
    padding:10px;
    margin-top:10px;
    width:100%;
}
</style>

</head>
<body>

<div class="container">

<h3>Simple Chat</h3>

<input id="myId" placeholder="Your ID (e.g. 101)">
<input id="userId" placeholder="Send To ID (e.g. 102)">

<div id="chatBox"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBKU5...",
    authDomain: "qr-scanner-265fd.firebaseapp.com",
    projectId: "qr-scanner-265fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let unsubscribe = null;

// 🔥 CREATE CHAT ID
function getChatId(a,b){
    return [a,b].sort().join("_");
}

// 🔥 SEND MESSAGE
window.sendMsg = async function(){

    let myId = document.getElementById("myId").value.trim();
    let userId = document.getElementById("userId").value.trim();
    let text = document.getElementById("msg").value.trim();

    if(!myId || !userId || !text){
        alert("Fill all fields");
        return;
    }

    let chatId = getChatId(myId,userId);

    await addDoc(collection(db,"messages",chatId,"chat"),{
        sender: myId,
        receiver: userId,
        text: text,
        time: new Date()
    });

    document.getElementById("msg").value = "";
}

// 🔥 LOAD MESSAGES REALTIME
function loadChat(){

    let myId = document.getElementById("myId").value.trim();
    let userId = document.getElementById("userId").value.trim();

    if(!myId || !userId) return;

    let chatId = getChatId(myId,userId);

    let q = query(
        collection(db,"messages",chatId,"chat"),
        orderBy("time")
    );

    if(unsubscribe) unsubscribe();

    unsubscribe = onSnapshot(q,(snap)=>{

        let box = document.getElementById("chatBox");
        box.innerHTML = "";

        snap.forEach(docu=>{
            let d = docu.data();

            let div = document.createElement("div");
            div.className = "msg " + (d.sender===myId ? "me":"other");
            div.innerText = d.text;

            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
}

// 🔄 AUTO LOAD WHEN ID CHANGE
document.getElementById("userId").addEventListener("change", loadChat);
document.getElementById("myId").addEventListener("change", loadChat);

</script>

</body>
</html>
